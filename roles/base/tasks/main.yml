---
# Role: base — core packages that should be present on every Kali build

# --- GitHub CLI apt repo (gh is not in standard Kali repos) ---
- name: "Create /etc/apt/keyrings directory (if not present)"
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: yes

- name: "Download GitHub CLI GPG key"
  ansible.builtin.get_url:
    url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    dest: /etc/apt/keyrings/githubcli-archive-keyring.gpg
    mode: '0644'
  become: yes

- name: "Add GitHub CLI apt repository"
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
    state: present
    filename: github-cli
    update_cache: yes
  become: yes

- name: "Install core packages"
  ansible.builtin.apt:
    name:
      - jq
      - pipx
      - flameshot
      - libimage-exiftool-perl   # exiftool
      - rsyslog
      - ca-certificates
      - curl
      - gh
      - git
      - wget
      - unzip
      - 7zip
      - python3-pip
      - python3-venv
      - golang-go
      - tmux
      - zsh
      - vim
      - neovim
    state: present
  become: yes

- name: "Ensure pipx path is configured for user"
  ansible.builtin.command:
    cmd: pipx ensurepath
  changed_when: false

- name: "Set GOPATH in user profile"
  ansible.builtin.lineinfile:
    path: "{{ user_home }}/.zshrc"
    regexp: '^export GOPATH='
    line: 'export GOPATH="{{ gopath }}"'
    create: yes
  tags: shell_config

- name: "Add GOPATH/bin to PATH in user profile"
  ansible.builtin.lineinfile:
    path: "{{ user_home }}/.zshrc"
    regexp: '^export PATH=.*GOPATH'
    line: 'export PATH="$PATH:{{ gopath_bin }}"'
    create: yes
  tags: shell_config
