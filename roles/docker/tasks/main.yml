---
# Role: docker — install official Docker CE (not the Kali docker.io package)

- name: "Remove unofficial docker packages"
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose
      - docker-doc
      - podman-docker
    state: absent
  become: yes
  register: docker_remove

- name: "Remove leftover containerd/runc if docker was removed"
  ansible.builtin.apt:
    name:
      - containerd
      - runc
    state: absent
  become: yes
  when: docker_remove.changed

- name: "Install Docker GPG key prerequisites"
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
  become: yes

- name: "Create /etc/apt/keyrings directory"
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: yes

- name: "Download Docker GPG key"
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
  become: yes

- name: "Add Docker apt repository (Kali uses Debian bookworm)"
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ docker_distribution }} stable"
    state: present
    filename: docker-ce
    update_cache: yes
  become: yes

- name: "Install Docker CE"
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  become: yes

- name: "Add user to docker group"
  ansible.builtin.user:
    name: "{{ local_user }}"
    groups: docker
    append: yes
  become: yes

- name: "Enable and start Docker service"
  ansible.builtin.service:
    name: docker
    enabled: yes
    state: started
  become: yes
