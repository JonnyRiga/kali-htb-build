---
# Role: terminal — deploy QTerminal preset

- name: "Create QTerminal config directory"
  ansible.builtin.file:
    path: "{{ user_home }}/.config/qterminal.org"
    state: directory
    mode: '0755'

- name: "Check if qterminal.ini already exists"
  ansible.builtin.stat:
    path: "{{ user_home }}/.config/qterminal.org/qterminal.ini"
  register: qterminal_ini_stat

- name: "Deploy QTerminal configuration (initial only, do not overwrite)"
  ansible.builtin.template:
    src: qterminal.ini.j2
    dest: "{{ user_home }}/.config/qterminal.org/qterminal.ini"
    owner: "{{ local_user }}"
    group: "{{ local_user }}"
    mode: '0644'
  when: not qterminal_ini_stat.stat.exists

- name: "Deploy QTerminal bookmarks"
  ansible.builtin.copy:
    src: "{{ role_path }}/files/qterminal_bookmarks.xml"
    dest: "{{ user_home }}/.config/qterminal.org/qterminal_bookmarks.xml"
    owner: "{{ local_user }}"
    group: "{{ local_user }}"
    mode: '0644'
