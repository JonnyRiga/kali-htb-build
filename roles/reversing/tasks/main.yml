---
# Role: reversing — binary analysis, debugging, and reverse engineering

- name: "Install reversing tools via apt"
  ansible.builtin.apt:
    name:
      - gdb
      - ghidra
      - radare2
      - binwalk
      - foremost
      - steghide
      - stegseek
      - ltrace
      - strace
    state: present
  become: yes

# --- pwndbg ---
# pwndbg's setup.sh calls sudo internally and needs 'uv'. We pre-install
# its apt deps and uv ourselves, then run setup.sh as root so internal
# sudo calls don't block on a missing TTY.
- name: "Install pwndbg apt prerequisites"
  ansible.builtin.apt:
    name:
      - python3
      - python3-dev
      - python3-venv
      - python3-pip
    state: present
  become: yes

- name: "Install uv (needed by pwndbg setup)"
  ansible.builtin.shell: |
    curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    creates: "{{ user_home }}/.local/bin/uv"
  environment:
    INSTALLER_NO_MODIFY_PATH: "1"

- name: "Clone pwndbg"
  ansible.builtin.git:
    repo: "https://github.com/pwndbg/pwndbg.git"
    dest: "{{ user_home }}/pwndbg"
    depth: 1
  register: pwndbg_clone

- name: "Install pwndbg"
  ansible.builtin.shell: |
    cd {{ user_home }}/pwndbg && ./setup.sh
  args:
    creates: "{{ user_home }}/pwndbg/.venv"
  become: yes
  environment:
    HOME: "{{ user_home }}"
    PATH: "{{ user_home }}/.local/bin:{{ ansible_env.PATH }}"

# --- Chainsaw ---
- name: "Download and extract Chainsaw"
  ansible.builtin.shell: |
    LATEST=$(curl -s https://api.github.com/repos/WithSecureLabs/chainsaw/releases/latest | jq -r '.tag_name' | sed 's/^v//')
    curl -sL "https://github.com/WithSecureLabs/chainsaw/releases/download/v${LATEST}/chainsaw_all_platforms+rules+evtx_logs.zip" -o /tmp/chainsaw.zip
    unzip -o /tmp/chainsaw.zip -d {{ opt_dir }}/
    rm -f /tmp/chainsaw.zip
  args:
    creates: "{{ opt_dir }}/chainsaw"
  become: yes
