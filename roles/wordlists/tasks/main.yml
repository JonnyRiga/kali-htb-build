---
# Role: wordlists — ensure standard wordlists are available
# Uses git clone for SecLists to get latest (apt package is often outdated).

- name: "Install git (required for SecLists clone)"
  ansible.builtin.apt:
    name: git
    state: present
  become: yes

- name: "Check if /usr/share/seclists is a git repo"
  ansible.builtin.stat:
    path: /usr/share/seclists/.git
  register: seclists_git

- name: "Remove non-git SecLists directory (apt-installed version)"
  ansible.builtin.file:
    path: /usr/share/seclists
    state: absent
  become: yes
  when: not seclists_git.stat.exists

- name: "Clone SecLists (shallow, latest only)"
  ansible.builtin.git:
    repo: https://github.com/danielmiessler/SecLists.git
    dest: /usr/share/seclists
    version: master
    depth: 1
    update: yes
  become: yes

- name: "Symlink SecLists to /opt/SecLists for tool compatibility"
  ansible.builtin.file:
    src: /usr/share/seclists
    dest: "{{ opt_dir }}/SecLists"
    state: link
  become: yes

- name: "Ensure rockyou.txt is decompressed"
  ansible.builtin.shell: |
    gunzip /usr/share/wordlists/rockyou.txt.gz
  args:
    creates: /usr/share/wordlists/rockyou.txt
  become: yes

- name: "Check if custom dirmaster.txt wordlist exists"
  ansible.builtin.stat:
    path: /usr/share/wordlists/dirmaster.txt
  register: dirmaster_stat

- name: "Note: dirmaster.txt not found — add manually to /usr/share/wordlists/"
  ansible.builtin.debug:
    msg: "Custom dirmaster.txt wordlist not found at /usr/share/wordlists/. Copy it manually if needed."
  when: not dirmaster_stat.stat.exists
