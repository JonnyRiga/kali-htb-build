---
# Role: browser — Firefox policies, Burp Suite extras

# --- Firefox extension policies ---
- name: "Ensure Firefox distribution directory exists"
  ansible.builtin.file:
    path: /usr/share/firefox-esr/distribution
    state: directory
    mode: '0755'
  become: yes

- name: "Deploy Firefox policies with extension installs"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/policies.json.j2"
    dest: /usr/share/firefox-esr/distribution/policies.json
    mode: '0644'
  become: yes

# --- Burp Suite extras (JRuby / Jython JARs) ---
- name: "Create BurpSuite extras directory"
  ansible.builtin.file:
    path: "{{ burpsuite_extras_dir }}"
    state: directory
    mode: '0755'
  become: yes

- name: "Download JRuby JAR for Burp Suite"
  ansible.builtin.get_url:
    url: "https://repo1.maven.org/maven2/org/jruby/jruby-complete/9.4.0.0/jruby-complete-9.4.0.0.jar"
    dest: "{{ burpsuite_extras_dir }}/jruby-complete.jar"
    checksum: "sha256:e6817cf528976a50a054910f006ee34df07c4580c8a2a4c8c8d61cda0238a108"
    mode: '0644'
  become: yes

- name: "Download Jython JAR for Burp Suite"
  ansible.builtin.get_url:
    url: "https://repo1.maven.org/maven2/org/python/jython-standalone/2.7.3/jython-standalone-2.7.3.jar"
    dest: "{{ burpsuite_extras_dir }}/jython-standalone.jar"
    checksum: "sha256:da7f3d829b148bcfa86b059dc964e3a8556fedb021096c8db07e30c66faab9b4"
    mode: '0644'
  become: yes

# --- Burp CA cert (automated headless extraction) ---
# Run with: ansible-playbook site.yml --tags burp_cert -K
# Launches Burp headlessly, waits for init, fetches cert, imports system-wide.
- name: "Check if BurpSuiteCA.der already exists"
  ansible.builtin.stat:
    path: /usr/local/share/ca-certificates/BurpSuiteCA.der
  register: burp_cert
  tags: ['burp_cert', 'never']

- name: "Copy getburpcert.sh helper script"
  ansible.builtin.copy:
    src: "{{ role_path }}/files/getburpcert.sh"
    dest: /usr/local/bin/getburpcert.sh
    owner: root
    group: root
    mode: '0755'
  become: yes
  tags: ['burp_cert', 'never']

- name: "Run getburpcert.sh to extract Burp CA cert"
  ansible.builtin.command: /usr/local/bin/getburpcert.sh
  register: burpcert_result
  when: not burp_cert.stat.exists
  tags: ['burp_cert', 'never']

- name: "Install extracted Burp CA cert system-wide"
  ansible.builtin.copy:
    src: /tmp/BurpSuiteCA.der
    dest: /usr/local/share/ca-certificates/BurpSuiteCA.der
    mode: '0644'
    remote_src: yes
  become: yes
  when: not burp_cert.stat.exists
  tags: ['burp_cert', 'never']

- name: "Update CA certificates after Burp cert install"
  ansible.builtin.command: update-ca-certificates
  become: yes
  when: not burp_cert.stat.exists
  tags: ['burp_cert', 'never']
